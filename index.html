<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #eee;
            font-family: Arial, sans-serif;
            padding: 15px;
            min-height: 100vh;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 15px;
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .anime-card {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #16213e;
        }
        .anime-card h3 {
            color: #eee;
            margin-bottom: 5px;
        }
        .anime-card p {
            color: #aaa;
            font-size: 13px;
        }
        .anime-card .score { color: #ffd700; }
        .anime-card .eps { color: #4ecca3; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal.active { display: block; }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h2 { color: #e94560; font-size: 18px; }
        .close-btn {
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 10px;
        }
        .episode-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1a1a2e;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            gap: 10px;
        }
        .episode-item .num {
            color: #e94560;
            font-weight: bold;
            min-width: 40px;
        }
        .episode-item .title { flex: 1; color: #eee; }
        .episode-item .play { color: #e94560; }
        #player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
        }
        #player-container.active { display: flex; flex-direction: column; }
        #player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #1a1a2e;
        }
        #player-header span { color: #e94560; cursor: pointer; font-size: 16px; }
        iframe { flex: 1; border: none; width: 100%; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>🍥 Anime Player</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar anime..." onkeydown="if(event.key==='Enter')searchAnime()">
        <button onclick="searchAnime()">🔍</button>
    </div>

    <div id="results"></div>
    <div id="loading" class="loading" style="display:none;">A buscar...</div>

    <!-- Modal Episódios -->
    <div id="episodesModal" class="modal">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div id="episodesList"></div>
    </div>

    <!-- Player -->
    <div id="player-container">
        <div id="player-header">
            <span onclick="closePlayer()">← Voltar</span>
            <span style="color:#eee;">🎬 Player</span>
            <span></span>
        </div>
        <iframe id="playerFrame" allowfullscreen></iframe>
    </div>

    <script>
        const API_JIKAN = 'https://api.jikan.moe/v4';

        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';

            try {
                const res = await fetch(`${API_JIKAN}/anime?q=${encodeURIComponent(query)}&limit=12`);
                const data = await res.json();

                if (data.data && data.data.length > 0) {
                    renderResults(data.data);
                } else {
                    document.getElementById('results').innerHTML = '<p class="loading">Nada encontrado</p>';
                }
            } catch (err) {
                document.getElementById('results').innerHTML = '<p class="loading">Erro na busca</p>';
            }

            document.getElementById('loading').style.display = 'none';
        }

        function renderResults(animes) {
            let html = '';
            animes.forEach(anime => {
                html += `
                    <div class="anime-card" onclick="openEpisodes(${anime.mal_id}, '${escapeHtml(anime.title)}')">
                        <h3>${anime.title}</h3>
                        <p>
                            <span class="score">⭐ ${anime.score || '?'}</span> • 
                            <span class="eps">🎬 ${anime.episodes || '?'} eps</span> • 
                            ${anime.type || ''}
                        </p>
                        <p style="margin-top:5px; font-size:12px;">${(anime.synopsis || '').substring(0, 150)}...</p>
                    </div>
                `;
            });
            document.getElementById('results').innerHTML = html;
        }

        async function openEpisodes(malId, title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('episodesModal').classList.add('active');
            document.getElementById('episodesList').innerHTML = '<p class="loading">A carregar episódios...</p>';

            try {
                // Buscar na Consumet API
                const res = await fetch(`https://api.consumet.org/anime/gogoanime/${encodeURIComponent(title)}`);
                const data = await res.json();

                if (data.results && data.results.length > 0) {
                    const animeId = data.results[0].id;
                    const infoRes = await fetch(`https://api.consumet.org/anime/gogoanime/info/${animeId}`);
                    const infoData = await infoRes.json();

                    if (infoData.episodes && infoData.episodes.length > 0) {
                        let html = '';
                        infoData.episodes.forEach(ep => {
                            html += `
                                <div class="episode-item" onclick="playEpisode('${ep.id}', 'Ep ${ep.number}')">
                                    <span class="num">Ep ${ep.number}</span>
                                    <span class="title">${ep.title || 'Episódio ' + ep.number}</span>
                                    <span class="play">▶</span>
                                </div>
                            `;
                        });
                        document.getElementById('episodesList').innerHTML = html;
                    } else {
                        document.getElementById('episodesList').innerHTML = '<p class="loading">Sem episódios encontrados</p>';
                    }
                } else {
                    // Fallback: tentar busca alternativa
                    document.getElementById('episodesList').innerHTML = `
                        <p class="loading">Tenta usar o link direto:</p>
                        <div class="episode-item" onclick="playDirect('${encodeURIComponent(title)}')">
                            <span class="num">▶</span>
                            <span class="title">Abrir no GogoAnime</span>
                            <span class="play">🔗</span>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('episodesList').innerHTML = '<p class="loading">Erro ao carregar</p>';
            }
        }

        function playEpisode(episodeId, title) {
            document.getElementById('episodesModal').classList.remove('active');
            document.getElementById('player-container').classList.add('active');
            
            // Usar o player do GogoAnime
            const playerUrl = `https://goload.pro/streaming.php?id=${episodeId}`;
            document.getElementById('playerFrame').src = playerUrl;
        }

        function playDirect(title) {
            window.open(`https://gogoanime3.co/search.html?keyword=${title}`, '_blank');
        }

        function closeModal() {
            document.getElementById('episodesModal').classList.remove('active');
        }

        function closePlayer() {
            document.getElementById('player-container').classList.remove('active');
            document.getElementById('playerFrame').src = '';
        }

        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
