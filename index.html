<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFire Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #eee;
            font-family: Arial, sans-serif;
            padding: 15px;
            min-height: 100vh;
        }
        h1 { color: #e94560; text-align: center; margin: 15px 0; }
        .search { display: flex; gap: 8px; max-width: 500px; margin: 0 auto 20px auto; }
        input {
            flex: 1; padding: 12px; border-radius: 8px;
            border: 1px solid #333; background: #1a1a2e;
            color: #eee; font-size: 16px;
        }
        button {
            padding: 12px 20px; background: #e94560; color: #fff;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px; max-width: 900px; margin: 0 auto;
        }
        .card {
            background: #1a1a2e; border-radius: 10px; padding: 15px;
            border: 1px solid #16213e;
        }
        .card h3 { font-size: 16px; margin-bottom: 8px; }
        .card .info { font-size: 12px; color: #aaa; margin-bottom: 6px; }
        .card .score { color: #ffd700; }
        .card .eps { color: #4ecca3; }
        .card .sinopse { font-size: 11px; color: #999; margin-bottom: 12px; }
        .card a {
            display: block; text-align: center; padding: 10px;
            border-radius: 6px; text-decoration: none; font-size: 14px; margin-bottom: 5px;
        }
        .card a.animefire { background: #e94560; color: #fff; }
        .card a.animefire:hover { background: #c73a52; }
        .card a.gogo { background: #4ecca3; color: #000; }
        .card a.gogo:hover { background: #3da882; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        .vazio { text-align: center; padding: 60px; color: #555; }
    </style>
</head>
<body>

    <h1>🍥 Anime Player</h1>

    <div class="search">
        <input type="text" id="pesquisa" placeholder="Nome do anime..." autofocus>
        <button onclick="buscar()">🔍</button>
    </div>

    <div class="grid" id="lista"></div>
    <div class="loading" id="loading" style="display:none;">A buscar...</div>

    <script>
        const ANIMEFIRE = 'https://animefire.io';
        const GOGO = 'https://gogoanimes.cv';

        async function buscar() {
            const q = document.getElementById('pesquisa').value.trim();
            if (!q) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('lista').innerHTML = '';

            try {
                const r = await fetch('https://api.jikan.moe/v4/anime?q=' + encodeURIComponent(q) + '&limit=12');
                const d = await r.json();

                if (d.data && d.data.length > 0) {
                    let html = '';
                    d.data.forEach(a => {
                        const slug = a.title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                        html += `
                            <div class="card">
                                <h3>${a.title}</h3>
                                <p class="info">
                                    <span class="score">⭐ ${a.score || '?'}</span> •
                                    <span class="eps">🎬 ${a.episodes || '?'} eps</span> •
                                    ${a.type || ''} • ${a.year || ''}
                                </p>
                                <p class="sinopse">${(a.synopsis || '').substring(0, 150)}...</p>
                                <a href="${ANIMEFIRE}/pesquisar/${encodeURIComponent(slug)}" target="_blank" class="animefire">
                                    ▶ AnimeFire
                                </a>
                                <a href="${GOGO}/search?q=${encodeURIComponent(a.title)}" target="_blank" class="gogo">
                                    ▶ GogoAnimes
                                </a>
                            </div>
                        `;
                    });
                    document.getElementById('lista').innerHTML = html;
                } else {
                    document.getElementById('lista').innerHTML = '<p class="vazio">Nada encontrado</p>';
                }
            } catch(e) {
                document.getElementById('lista').innerHTML = '<p class="vazio">Erro de conexão</p>';
            }

            document.getElementById('loading').style.display = 'none';
        }

        document.getElementById('pesquisa').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') buscar();
        });

        // Abre com Naruto de exemplo
        window.onload = function() {
            document.getElementById('pesquisa').value = 'Naruto';
            buscar();
        };
    </script>
</body>
</html>
