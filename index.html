<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFire Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #eee;
            font-family: Arial, sans-serif;
            padding: 15px;
            min-height: 100vh;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #e94560; }
        button {
            padding: 12px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }
        button:hover { background: #c73a52; }
        button:disabled { background: #555; cursor: not-allowed; }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }
        .anime-card {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            border: 1px solid #16213e;
            transition: transform 0.2s, border-color 0.2s;
        }
        .anime-card:hover {
            transform: translateY(-2px);
            border-color: #e94560;
        }
        .anime-card h3 {
            color: #eee;
            margin-bottom: 4px;
            font-size: 16px;
        }
        .anime-card .info {
            color: #aaa;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #e94560;
        }
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #0a0a1a;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: #0a0a1a;
            padding-bottom: 10px;
            border-bottom: 1px solid #16213e;
            z-index: 1;
        }
        .modal-header h2 {
            color: #e94560;
            font-size: 15px;
            flex: 1;
            margin-right: 10px;
        }
        .close-btn {
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }
        .episode-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #1a1a2e;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            gap: 10px;
            transition: background 0.2s;
        }
        .episode-item:hover { background: #16213e; }
        .episode-item .num {
            color: #e94560;
            font-weight: bold;
            min-width: 50px;
        }
        .episode-item .title { flex: 1; color: #eee; font-size: 13px; }
        .episode-item .play { color: #e94560; font-size: 16px; }
        
        /* Player */
        .player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }
        .player-overlay.active { display: flex; }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #1a1a2e;
        }
        .player-header span { color: #e94560; cursor: pointer; font-size: 15px; }
        .player-header .ep-title { color: #eee; font-size: 14px; }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1>🍥 AnimeFire Player</h1>
    <p class="subtitle">Busca direta no AnimeFire</p>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Ex: Naruto, One Piece..." autofocus>
        <button id="searchBtn" onclick="searchAnime()">🔍 Buscar</button>
    </div>

    <div id="results" class="anime-grid"></div>
    <div id="loadingMsg" class="loading" style="display:none;">Buscando no AnimeFire...</div>
    <div id="errorMsg" class="error" style="display:none;"></div>

    <!-- Modal Episódios -->
    <div class="modal-overlay" id="epModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="epModalTitle"></h2>
                <button class="close-btn" onclick="closeEpModal()">✕</button>
            </div>
            <div id="epList"></div>
        </div>
    </div>

    <!-- Player -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-header">
            <span onclick="closePlayer()">← Voltar</span>
            <span class="ep-title" id="playerTitle">🎬 Player</span>
            <span></span>
        </div>
        <iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        const ANIMEFIRE = 'https://animefire.net';
        // Usamos um proxy CORS público (alterna se falhar)
        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest=',
        ];
        let currentProxy = 0;

        async function fetchWithProxy(url) {
            // Tenta primeiro direto (pode funcionar em alguns navegadores)
            try {
                const directRes = await fetch(url);
                if (directRes.ok) return directRes.text();
            } catch (e) {
                // CORS bloqueou, usa proxy
            }

            // Tenta cada proxy
            for (let i = 0; i < PROXIES.length; i++) {
                try {
                    const proxyUrl = PROXIES[i] + encodeURIComponent(url);
                    const res = await fetch(proxyUrl);
                    if (res.ok) {
                        currentProxy = i;
                        return res.text();
                    }
                } catch (e) {
                    continue;
                }
            }
            throw new Error('Todos os proxies falharam');
        }

        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const btn = document.getElementById('searchBtn');
            const loading = document.getElementById('loadingMsg');
            const error = document.getElementById('errorMsg');
            const results = document.getElementById('results');

            btn.disabled = true;
            btn.textContent = '...';
            loading.style.display = 'block';
            error.style.display = 'none';
            results.innerHTML = '';

            try {
                const searchUrl = `${ANIMEFIRE}/pesquisar/${encodeURIComponent(query)}`;
                const html = await fetchWithProxy(searchUrl);
                
                // Parsear resultados
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const cards = doc.querySelectorAll('.card-anime');
                
                if (cards.length === 0) {
                    // Tenta formato alternativo
                    const altCards = doc.querySelectorAll('[class*="anime"] a[href*="/anime/"]');
                    if (altCards.length > 0) {
                        renderAltResults(altCards);
                    } else {
                        error.textContent = 'Nenhum anime encontrado no AnimeFire.';
                        error.style.display = 'block';
                    }
                } else {
                    renderResults(cards);
                }
            } catch (err) {
                console.error(err);
                error.innerHTML = `
                    Erro ao acessar AnimeFire.<br><br>
                    <small>Tenta usar outro navegador ou desativar bloqueadores de anúncio.</small><br><br>
                    <a href="${ANIMEFIRE}/pesquisar/${encodeURIComponent(query)}" target="_blank" style="color:#e94560;">
                        🔗 Abrir AnimeFire diretamente
                    </a>
                `;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Buscar';
                loading.style.display = 'none';
            }
        }

        function renderResults(cards) {
            const container = document.getElementById('results');
            let html = '';

            cards.forEach(card => {
                const link = card.querySelector('a')?.href || '';
                const title = card.querySelector('h3, .title, [class*="title"]')?.textContent?.trim() || 'Sem título';
                const img = card.querySelector('img')?.src || '';
                const eps = card.querySelector('[class*="ep"], .episodes')?.textContent?.trim() || '';

                if (link && link.includes('/anime/')) {
                    html += `
                        <div class="anime-card" onclick="openAnime('${encodeURIComponent(link)}', '${escapeHtml(title)}')">
                            ${img ? `<img src="${img}" style="width:100%;height:160px;object-fit:cover;border-radius:6px;margin-bottom:8px;" alt="">` : ''}
                            <h3>${title}</h3>
                            ${eps ? `<p class="info">${eps}</p>` : ''}
                        </div>
                    `;
                }
            });

            container.innerHTML = html || '<p class="loading">Nada encontrado</p>';
        }

        function renderAltResults(links) {
            const container = document.getElementById('results');
            let html = '';
            const seen = new Set();

            links.forEach(link => {
                const href = link.href || link.getAttribute('href') || '';
                const title = link.textContent?.trim() || link.querySelector('h3')?.textContent?.trim() || 'Sem título';

                if (href.includes('/anime/') && !seen.has(href)) {
                    seen.add(href);
                    html += `
                        <div class="anime-card" onclick="openAnime('${encodeURIComponent(href)}', '${escapeHtml(title)}')">
                            <h3>${title}</h3>
                        </div>
                    `;
                }
            });

            container.innerHTML = html || '<p class="loading">Nada encontrado</p>';
        }

        async function openAnime(encodedUrl, title) {
            document.getElementById('epModalTitle').textContent = decodeURIComponent(title);
            document.getElementById('epModal').classList.add('active');
            document.getElementById('epList').innerHTML = '<p class="loading">Carregando episódios...</p>';

            try {
                const url = decodeURIComponent(encodedUrl);
                const html = await fetchWithProxy(url);
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Procurar iframes ou links de episódios
                const iframes = doc.querySelectorAll('iframe[src*="player"], iframe[src*="video"], iframe[src*="embed"]');
                
                if (iframes.length > 0) {
                    // É uma página de episódio único - abrir direto
                    const playerSrc = iframes[0].src;
                    playDirect(playerSrc, title);
                    closeEpModal();
                    return;
                }

                // Procurar lista de episódios
                const epLinks = doc.querySelectorAll('a[href*="/episodio/"], a[href*="/ep/"], .episode-list a, [class*="episodio"] a');
                
                if (epLinks.length > 0) {
                    let html = '';
                    epLinks.forEach((link, i) => {
                        const epUrl = link.href || link.getAttribute('href') || '';
                        const epTitle = link.textContent?.trim() || `Episódio ${i + 1}`;
                        
                        if (epUrl) {
                            html += `
                                <div class="episode-item" onclick="openEpisode('${encodeURIComponent(epUrl)}', '${escapeHtml(epTitle)}')">
                                    <span class="num">${epTitle.replace(/[^0-9]/g, '') || i+1}</span>
                                    <span class="title">${epTitle}</span>
                                    <span class="play">▶</span>
                                </div>
                            `;
                        }
                    });
                    document.getElementById('epList').innerHTML = html || gerarEpisodiosFallback(title, url);
                } else {
                    document.getElementById('epList').innerHTML = gerarEpisodiosFallback(title, url);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('epList').innerHTML = `
                    <p class="error">Erro ao carregar episódios.</p>
                    <a href="${decodeURIComponent(encodedUrl)}" target="_blank" 
                       style="display:block;text-align:center;padding:12px;background:#e94560;color:#fff;border-radius:8px;text-decoration:none;margin-top:10px;">
                        🔗 Abrir no AnimeFire
                    </a>
                `;
            }
        }

        function gerarEpisodiosFallback(title, url) {
            // Gerar links genéricos de 1 a 24
            let html = '<p style="color:#aaa;font-size:12px;margin-bottom:10px;">Episódios (links genéricos):</p>';
            const baseUrl = url.replace(/\/$/, '');
            
            for (let i = 1; i <= 24; i++) {
                const epUrl = `${baseUrl}/episodio-${i}`;
                html += `
                    <div class="episode-item" onclick="openEpisode('${encodeURIComponent(epUrl)}', 'Episódio ${i}')">
                        <span class="num">Ep ${i}</span>
                        <span class="title">Episódio ${i}</span>
                        <span class="play">▶</span>
                    </div>
                `;
            }
            return html;
        }

        async function openEpisode(encodedUrl, title) {
            closeEpModal();
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerOverlay').classList.add('active');
            document.getElementById('playerFrame').src = '';

            try {
                const url = decodeURIComponent(encodedUrl);
                const html = await fetchWithProxy(url);
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Encontrar iframe do player
                const iframe = doc.querySelector('iframe[src*="player"], iframe[src*="video"], iframe[src*="embed"], iframe[src*="stream"]');
                
                if (iframe?.src) {
                    document.getElementById('playerFrame').src = iframe.src;
                } else {
                    // Tenta embed alternativo
                    const videoSrc = doc.querySelector('video source, video')?.src || 
                                    doc.querySelector('[data-video]')?.dataset?.video;
                    if (videoSrc) {
                        document.getElementById('playerFrame').src = videoSrc;
                    } else {
                        document.getElementById('playerFrame').src = url;
                    }
                }
            } catch (err) {
                document.getElementById('playerFrame').src = decodeURIComponent(encodedUrl);
            }
        }

        function playDirect(src, title) {
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerOverlay').classList.add('active');
            document.getElementById('playerFrame').src = src;
        }

        function closeEpModal() {
            document.getElementById('epModal').classList.remove('active');
        }

        function closePlayer() {
            document.getElementById('playerOverlay').classList.remove('active');
            document.getElementById('playerFrame').src = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Fechar modais ao clicar fora
        document.getElementById('epModal').addEventListener('click', function(e) {
            if (e.target === this) closeEpModal();
        });

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchAnime();
        });
    </script>
</body>
</html>
