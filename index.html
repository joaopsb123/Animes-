<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFire Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #eee;
            font-family: Arial, sans-serif;
            padding: 15px;
            min-height: 100vh;
        }
        h1 { color: #e94560; text-align: center; margin-bottom: 5px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; font-size: 12px; margin-bottom: 15px; }
        
        .search-box {
            display: flex; gap: 8px; margin-bottom: 15px;
            max-width: 600px; margin-left: auto; margin-right: auto;
        }
        input {
            flex: 1; padding: 12px; border-radius: 8px;
            border: 1px solid #333; background: #1a1a2e;
            color: #eee; font-size: 16px; outline: none;
        }
        input:focus { border-color: #e94560; }
        button {
            padding: 12px 20px; background: #e94560; color: #fff;
            border: none; border-radius: 8px; font-size: 16px;
            cursor: pointer; white-space: nowrap;
        }
        button:disabled { background: #555; }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px; max-width: 900px; margin: 0 auto;
        }
        .anime-card {
            background: #1a1a2e; border-radius: 10px; padding: 14px;
            cursor: pointer; border: 1px solid #16213e;
            transition: transform 0.2s, border-color 0.2s;
        }
        .anime-card:hover { transform: translateY(-2px); border-color: #e94560; }
        .anime-card h3 { color: #eee; font-size: 16px; margin-bottom: 4px; }
        .anime-card .info { color: #aaa; font-size: 12px; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        .error { text-align: center; padding: 40px; color: #e94560; }
        .error a { color: #e94560; }

        /* Modal Episódios */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            z-index: 1000; justify-content: center; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #0a0a1a; border-radius: 20px 20px 0 0;
            width: 100%; max-width: 500px; max-height: 80vh;
            overflow-y: auto; padding: 20px;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; position: sticky; top: 0;
            background: #0a0a1a; padding-bottom: 10px;
            border-bottom: 1px solid #16213e; z-index: 1;
        }
        .modal-header h2 { color: #e94560; font-size: 15px; flex: 1; }
        .close-btn { color: #fff; font-size: 28px; cursor: pointer; background: none; border: none; }
        
        .episode-item {
            display: flex; align-items: center; padding: 10px 12px;
            background: #1a1a2e; margin-bottom: 6px; border-radius: 8px;
            cursor: pointer; gap: 10px; transition: background 0.2s;
        }
        .episode-item:hover { background: #16213e; }
        .episode-item .num { color: #e94560; font-weight: bold; min-width: 50px; font-size: 13px; }
        .episode-item .title { flex: 1; color: #eee; font-size: 13px; }
        .episode-item .play { color: #e94560; font-size: 16px; }

        /* Player */
        .player-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000;
            z-index: 2000; flex-direction: column;
        }
        .player-overlay.active { display: flex; }
        .player-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; background: #1a1a2e;
        }
        .player-header span { color: #e94560; cursor: pointer; font-size: 15px; }
        .player-header .ep-title { color: #eee; font-size: 13px; }
        iframe { flex: 1; border: none; width: 100%; }
    </style>
</head>
<body>

    <h1>🍥 AnimeFire Player</h1>
    <p class="subtitle">animefire.io</p>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Ex: Naruto, One Piece..." autofocus>
        <button id="searchBtn" onclick="searchAnime()">🔍 Buscar</button>
    </div>

    <div id="results" class="anime-grid"></div>
    <div id="loadingMsg" class="loading" style="display:none;">Buscando...</div>
    <div id="errorMsg" class="error" style="display:none;"></div>

    <!-- Modal Episódios -->
    <div class="modal-overlay" id="epModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="epModalTitle"></h2>
                <button class="close-btn" onclick="closeEpModal()">✕</button>
            </div>
            <div id="epList"></div>
        </div>
    </div>

    <!-- Player -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-header">
            <span onclick="closePlayer()">← Voltar</span>
            <span class="ep-title" id="playerTitle">🎬 Player</span>
            <span></span>
        </div>
        <iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        const BASE = 'https://animefire.io';
        
        // Proxies CORS (para bypass)
        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest=',
        ];

        async function fetchWithProxy(url) {
            // Tenta direto primeiro
            try {
                const r = await fetch(url, { mode: 'cors' });
                if (r.ok) return r.text();
            } catch(e) {}

            // Tenta proxies
            for (let proxy of PROXIES) {
                try {
                    const r = await fetch(proxy + encodeURIComponent(url));
                    if (r.ok) return r.text();
                } catch(e) { continue; }
            }
            throw new Error('Sem conexão');
        }

        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const btn = document.getElementById('searchBtn');
            const loading = document.getElementById('loadingMsg');
            const error = document.getElementById('errorMsg');
            const results = document.getElementById('results');

            btn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            results.innerHTML = '';

            try {
                // AnimeFire usa: /search?q= ou /pesquisar/
                const urls = [
                    `${BASE}/search?q=${encodeURIComponent(query)}`,
                    `${BASE}/pesquisar/${encodeURIComponent(query)}`,
                ];

                let html = '';
                for (let u of urls) {
                    try {
                        html = await fetchWithProxy(u);
                        if (html.includes('anime') || html.includes('card')) break;
                    } catch(e) { continue; }
                }

                if (!html) throw new Error('Site offline');

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Tentar vários seletores
                let cards = doc.querySelectorAll('a[href*="/anime/"]');
                let found = [];

                cards.forEach(a => {
                    const href = a.href || a.getAttribute('href') || '';
                    const title = a.querySelector('h3, .title, [class*="title"]')?.textContent?.trim() 
                               || a.textContent?.trim() 
                               || '';
                    
                    if (href.includes('/anime/') && title && title.length > 2) {
                        // Evitar duplicados
                        if (!found.find(f => f.href === href)) {
                            found.push({ href, title: title.substring(0, 100) });
                        }
                    }
                });

                // Se não encontrou, tentar cards
                if (found.length === 0) {
                    const allLinks = doc.querySelectorAll('a[href]');
                    allLinks.forEach(a => {
                        const href = a.href || a.getAttribute('href') || '';
                        const title = a.textContent?.trim() || '';
                        if (href.includes('/anime/') && title.length > 2 && title.length < 120) {
                            if (!found.find(f => f.href === href)) {
                                found.push({ href, title });
                            }
                        }
                    });
                }

                if (found.length > 0) {
                    let cardsHtml = '';
                    found.slice(0, 20).forEach(item => {
                        cardsHtml += `
                            <div class="anime-card" onclick="openAnime('${encodeURIComponent(item.href)}', '${escapeHtml(item.title)}')">
                                <h3>${item.title}</h3>
                                <p class="info">${item.href.replace(BASE, '')}</p>
                            </div>
                        `;
                    });
                    results.innerHTML = cardsHtml;
                } else {
                    error.innerHTML = `
                        Nada encontrado.<br><br>
                        <a href="${BASE}/search?q=${encodeURIComponent(query)}" target="_blank">
                            🔗 Buscar diretamente no AnimeFire
                        </a>
                    `;
                    error.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                error.innerHTML = `
                    Erro: ${err.message}<br><br>
                    <a href="${BASE}/search?q=${encodeURIComponent(query)}" target="_blank">
                        🔗 Abrir AnimeFire
                    </a>
                `;
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        async function openAnime(encodedUrl, title) {
            document.getElementById('epModalTitle').textContent = decodeURIComponent(title);
            document.getElementById('epModal').classList.add('active');
            document.getElementById('epList').innerHTML = '<p class="loading">Carregando...</p>';

            try {
                const url = decodeURIComponent(encodedUrl);
                const html = await fetchWithProxy(url);
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Procurar iframe do player (se for página de episódio único)
                const iframe = doc.querySelector('iframe[src*="player"], iframe[src*="video"], iframe[src*="embed"]');
                if (iframe?.src) {
                    playEpisode(iframe.src, title);
                    closeEpModal();
                    return;
                }

                // Procurar lista de episódios
                const epLinks = doc.querySelectorAll('a[href*="/episodio/"], a[href*="/ep/"], a[href*="/video/"]');
                
                if (epLinks.length > 0) {
                    let listHtml = '';
                    epLinks.forEach((link, i) => {
                        const epUrl = link.href || link.getAttribute('href') || '';
                        const epTitle = link.textContent?.trim() || `Ep ${i + 1}`;
                        if (epUrl) {
                            listHtml += `
                                <div class="episode-item" onclick="openEpisodeUrl('${encodeURIComponent(epUrl)}', '${escapeHtml(epTitle)}')">
                                    <span class="num">Ep ${i + 1}</span>
                                    <span class="title">${epTitle}</span>
                                    <span class="play">▶</span>
                                </div>
                            `;
                        }
                    });
                    document.getElementById('epList').innerHTML = listHtml || gerarFallback(url, title);
                } else {
                    document.getElementById('epList').innerHTML = gerarFallback(url, title);
                }
            } catch (err) {
                document.getElementById('epList').innerHTML = `
                    <p class="error">Erro ao carregar</p>
                    <a href="${decodeURIComponent(encodedUrl)}" target="_blank" 
                       style="display:block;text-align:center;padding:12px;background:#e94560;color:#fff;border-radius:8px;text-decoration:none;">
                        🔗 Abrir no AnimeFire
                    </a>
                `;
            }
        }

        function gerarFallback(baseUrl, title) {
            let html = '<p style="color:#aaa;font-size:11px;margin-bottom:8px;">Tentativa com links genéricos:</p>';
            const cleanUrl = baseUrl.replace(/\/$/, '');
            for (let i = 1; i <= 24; i++) {
                html += `
                    <div class="episode-item" onclick="openEpisodeUrl('${encodeURIComponent(cleanUrl + '/episodio-' + i)}', 'Episódio ${i}')">
                        <span class="num">Ep ${i}</span>
                        <span class="title">Episódio ${i}</span>
                        <span class="play">▶</span>
                    </div>
                `;
            }
            html += `
                <a href="${baseUrl}" target="_blank" 
                   style="display:block;text-align:center;padding:12px;background:#e94560;color:#fff;border-radius:8px;text-decoration:none;margin-top:10px;">
                    🔗 Ver todos no site
                </a>
            `;
            return html;
        }

        async function openEpisodeUrl(encodedUrl, title) {
            closeEpModal();
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerOverlay').classList.add('active');

            try {
                const url = decodeURIComponent(encodedUrl);
                const html = await fetchWithProxy(url);
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const iframe = doc.querySelector('iframe[src*="player"], iframe[src*="video"], iframe[src*="embed"], iframe');
                if (iframe?.src) {
                    document.getElementById('playerFrame').src = iframe.src;
                } else {
                    document.getElementById('playerFrame').src = url;
                }
            } catch (err) {
                document.getElementById('playerFrame').src = decodeURIComponent(encodedUrl);
            }
        }

        function playEpisode(src, title) {
            document.getElementById('playerTitle').textContent = title;
            document.getElementById('playerOverlay').classList.add('active');
            document.getElementById('playerFrame').src = src;
        }

        function closeEpModal() {
            document.getElementById('epModal').classList.remove('active');
        }

        function closePlayer() {
            document.getElementById('playerOverlay').classList.remove('active');
            document.getElementById('playerFrame').src = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('epModal').addEventListener('click', function(e) {
            if (e.target === this) closeEpModal();
        });

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchAnime();
        });
    </script>
</body>
</html>
